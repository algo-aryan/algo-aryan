<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 3000 600">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001133" />
      <stop offset="100%" stop-color="#004488" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes expandContract {
      0% { transform: scale(0.92); }
      50% { transform: scale(1.03); }
      100% { transform: scale(0.92); }
    }
    .cloud-banner {
      animation: expandContract 4s ease-in-out infinite;
      transform-origin: 1500px 300px;
    }
    .heading-text {
      font-family: 'Courier New', monospace;
      font-weight: 900;
      font-size: 150px;
      fill: #00FF66;
      letter-spacing: 3px;
    }
  </style>

  <g class="cloud-banner">
    <g fill="url(#cloudGrad)" filter="url(#glow)">
        <!-- Top layer -->
        <circle cx="300" cy="280" r="90" />
        <circle cx="500" cy="230" r="130" />
        <circle cx="750" cy="260" r="110" />
        <circle cx="1000" cy="210" r="150" />
        <circle cx="1250" cy="250" r="120" />
        <circle cx="1500" cy="200" r="160" />
        <circle cx="1750" cy="240" r="130" />
        <circle cx="2000" cy="220" r="140" />
        <circle cx="2250" cy="260" r="110" />
        <circle cx="2500" cy="230" r="120" />
        <circle cx="2700" cy="280" r="90" />
        
        <!-- Bottom fill layer -->
        <circle cx="400" cy="330" r="100" />
        <circle cx="600" cy="300" r="110" />
        <circle cx="850" cy="340" r="130" />
        <circle cx="1100" cy="310" r="140" />
        <circle cx="1350" cy="350" r="120" />
        <circle cx="1600" cy="320" r="150" />
        <circle cx="1850" cy="350" r="130" />
        <circle cx="2100" cy="310" r="120" />
        <circle cx="2350" cy="340" r="110" />
        <circle cx="2600" cy="320" r="100" />
    </g>
    
    <!-- Text centered in the cloud -->
    <text x="1500" y="315" text-anchor="middle" alignment-baseline="middle" class="heading-text" filter="url(#glow)">PROFESSIONAL EXPERIENCE</text>
  </g>
</svg>
