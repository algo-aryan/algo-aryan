<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001133" />
      <stop offset="100%" stop-color="#004488" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes expandContract {
      0% { transform: scale(0.92); }
      50% { transform: scale(1.03); }
      100% { transform: scale(0.92); }
    }
    .cloud-banner {
      animation: expandContract 4s ease-in-out infinite;
      transform-origin: 600px 150px;
    }
    .heading-text {
      font-family: 'Fira Code', monospace, sans-serif;
      font-weight: 900;
      font-size: 60px;
      fill: #00FFFF;
      letter-spacing: 3px;
    }
  </style>

  <g class="cloud-banner">
    <g fill="url(#cloudGrad)" filter="url(#glow)">
        <circle cx="200" cy="180" r="60" />
        <circle cx="300" cy="140" r="80" />
        <circle cx="430" cy="100" r="100" />
        <circle cx="600" cy="80"  r="120" />
        <circle cx="770" cy="100" r="100" />
        <circle cx="900" cy="140" r="80" />
        <circle cx="1000" cy="180" r="60" />
        
        <!-- Fill the bottom gaps smoothly without a sharp bar -->
        <circle cx="300" cy="200" r="60" />
        <circle cx="450" cy="210" r="60" />
        <circle cx="600" cy="220" r="60" />
        <circle cx="750" cy="210" r="60" />
        <circle cx="900" cy="200" r="60" />

        <rect x="200" y="120" width="800" height="120" rx="40" />
    </g>
    
    <!-- Text centered in the cloud -->
    <text x="600" y="175" text-anchor="middle" alignment-baseline="middle" class="heading-text" filter="url(#glow)">HONORS &amp; ACHIEVEMENTS</text>
  </g>
</svg>
